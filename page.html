<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Auto Redirect Kiosk</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  color: white;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
}
</style>
</head>

<body>
<div id="msg">Loading...</div>

<script>
// 🔧 在這裡放你的 webcam / 網站清單（最多24個）
const sites = [
  "https://example.com/1",
  "https://example.com/2",
  "https://example.com/3",
  "https://example.com/4"
];

let i = 0;
const delay = 10000; // 每個網站停留時間（毫秒）

function goNext() {
  document.getElementById("msg").innerText = "Loading: " + sites[i];

  setTimeout(() => {
    window.location.href = sites[i];
    i = (i + 1) % sites.length;
  }, 500);
}

goNext();
setInterval(goNext, delay);
</script>

</body>
</html>
