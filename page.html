<iframe id="viewer" width="100%" height="100%"></iframe>

<script>
const urls = [
  "https://pgaskin.net/kepubify/try/",
  "https://en.wikipedia.org/wiki/Daylight_saving_time",
  "https://www.youtube.com/watch?v=61pi8UjLOlo"
];

let i = 0;

function nextPage() {
  i = (i + 1) % urls.length;
  document.getElementById("viewer").src = urls[i];
}

window.onload = function () {
  document.getElementById("viewer").src = urls[0];
  setInterval(nextPage, 5000);
};
</script>
